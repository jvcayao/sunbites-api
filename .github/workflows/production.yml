name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true
        default: ''

jobs:
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest

    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Confirmation failed. Type DEPLOY to proceed."
            exit 1
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@2.32.0
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs

      - name: Copy env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Create SQLite database
        run: touch database/database.sqlite

      - name: Run tests
        run: php artisan test --compact

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Laravel Cloud CLI
        run: composer global require laravel/cloud-cli --no-interaction

      - name: Deploy to production
        run: ~/.composer/vendor/bin/cloud deploy sunbites-api production -n
        env:
          CLOUD_API_TOKEN: ${{ secrets.CLOUD_API_TOKEN }}

      - name: Monitor deployment
        run: ~/.composer/vendor/bin/cloud deploy:monitor -n
        env:
          CLOUD_API_TOKEN: ${{ secrets.CLOUD_API_TOKEN }}
