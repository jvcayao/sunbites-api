name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@2.32.0
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs

      - name: Copy env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Create SQLite database
        run: touch database/database.sqlite

      - name: Run tests
        run: php artisan test --compact

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Laravel Cloud CLI
        run: |
          composer global require laravel/cloud-cli --no-interaction
          echo "$HOME/.composer/vendor/bin" >> $GITHUB_PATH

      - name: Authenticate with Laravel Cloud
        env:
          CLOUD_TOKEN: ${{ secrets.CLOUD_API_TOKEN }}
        run: |
          mkdir -p ~/.config/cloud
          printf '{"api_tokens":["%s"]}' "$CLOUD_TOKEN" > ~/.config/cloud/config.json

      - name: Deploy to staging
        run: cloud deploy "Sunbites API Prod" staging -n

      - name: Monitor deployment
        run: cloud deploy:monitor -n
